steps:
  - label: ":docker: Build Test Container"
    key: build-test
    command: |
      set -euo pipefail
      echo "+++ :docker: Building test container"
      podman build -t scd-rs-agent:test -f Containerfile.test .

  - wait: ~

  - group: ":cargo: Checks"
    key: checks
    steps:
      - label: ":rustfmt: Format"
        command: |
          echo "+++ :rustfmt: cargo fmt --check"
          podman run --rm -v "$$PWD:/src:z" -w /src \
            scd-rs-agent:test cargo fmt --all -- --check

      - label: ":clippy: Lint"
        command: |
          echo "+++ :clippy: cargo clippy"
          podman run --rm -v "$$PWD:/src:z" -w /src \
            scd-rs-agent:test \
            cargo clippy --workspace --all-targets -- -D warnings

      - label: ":cargo: Test"
        command: |
          echo "+++ :cargo: cargo test"
          podman run --rm -v "$$PWD:/src:z" -w /src \
            scd-rs-agent:test cargo test --workspace
